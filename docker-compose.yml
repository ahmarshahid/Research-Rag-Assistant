services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres_ai_research
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_research
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_network
    command: postgres -c shared_preload_libraries=pg_stat_statements

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis_ai_research
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_network
    command: redis-server --appendonly yes

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_ai_research
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ai_research
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: ./data/chroma
      ENVIRONMENT: development
      DEBUG: "True"
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - ai_network
    stdin_open: true
    tty: true
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        python -c 'from app.dependencies import init_db; import asyncio; asyncio.run(init_db())' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Frontend (Optional - uncomment to use Docker for frontend too)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: frontend_ai_research
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./frontend:/app
  #   networks:
  #     - ai_network
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai_network:
    driver: bridge
